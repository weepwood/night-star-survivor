name: 网页游戏检查

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 检查 JavaScript 语法
        run: |
          node --check game.js
          node --check single-screen.js
          node --check rich-content.js
          node --check combat-telemetry.js
          node --check live-upgrade.js
          node --check gameplay-director.js
          node --check victory-guard.js
          node --check cosmic-contracts.js
          node --check adaptive-hud.js
          node --check nightfall-v3.js
          node --check nightfall-v3-integrity.js
          node --check ui-overlap-guard.js
          node --check long-run-performance.js
          node --check fit-canvas.js
          node --check tests/hud-structure.mjs
          node --check tests/live-upgrade.mjs
          node --check tests/gameplay-director.mjs
          node --check tests/cosmic-contracts.mjs
          node --check tests/adaptive-hud.mjs
          node --check tests/nightfall-v3.mjs
          node --check tests/long-run-performance.mjs

      - name: 检查核心静态文件
        run: |
          test -s index.html
          test -s style.css
          test -s game.js
          test -s single-screen.js
          test -s rich-content.css
          test -s rich-content.js
          test -s combat-telemetry.css
          test -s combat-telemetry.js
          test -s live-upgrade.css
          test -s live-upgrade.js
          test -s gameplay-director.css
          test -s gameplay-director.js
          test -s gameplay-layout.css
          test -s victory-guard.js
          test -s cosmic-contracts.css
          test -s cosmic-contracts.js
          test -s adaptive-hud.css
          test -s adaptive-hud.js
          test -s nightfall-v3.css
          test -s nightfall-v3.js
          test -s nightfall-v3-integrity.js
          test -s ui-overlap-guard.css
          test -s ui-overlap-guard.js
          test -s long-run-performance.js
          test -s fit-canvas.css
          test -s fit-canvas.js
          test -s fullscreen-hud.css
          test -s hud-visibility.css
          test -s tests/hud-structure.mjs
          test -s tests/live-upgrade.mjs
          test -s tests/gameplay-director.mjs
          test -s tests/cosmic-contracts.mjs
          test -s tests/adaptive-hud.mjs
          test -s tests/nightfall-v3.mjs
          test -s tests/long-run-performance.mjs

      - name: 检查 Pixel-perfect 渲染约束
        run: |
          grep -q "const VIEW_WIDTH = 640" game.js
          grep -q "const VIEW_HEIGHT = 360" game.js
          grep -q "ctx.imageSmoothingEnabled = false" game.js
          grep -q "window.devicePixelRatio" game.js
          grep -q "image-rendering: pixelated" style.css
          grep -q 'width="640" height="360"' index.html

      - name: 检查单屏竞技场约束
        run: |
          grep -q "updateCameraSingleScreen" single-screen.js
          grep -q "camera.x = 0" single-screen.js
          grep -q "camera.y = 0" single-screen.js
          grep -q "clampToArena(player)" single-screen.js
          grep -q "完整单屏像素竞技场" index.html
          grep -q 'src="./game.js?v=' index.html
          grep -q 'src="./single-screen.js?v=' index.html

      - name: 检查丰富道具与视觉扩展
        run: |
          grep -q "彗星权杖" rich-content.js
          grep -q "棱镜星轮" rich-content.js
          grep -q "虚空星雷" rich-content.js
          grep -q "凤凰余烬" rich-content.js
          grep -q "星蚀宝箱" rich-content.js
          grep -q "drawAmbientMotes" rich-content.js
          grep -q "drawShockwaves" rich-content.js
          grep -q "rich-content.css" index.html
          grep -q "rich-content.js" index.html

      - name: 检查战斗稳定与输出统计
        run: |
          grep -q "DAMAGE_WINDOW_SECONDS = 5" combat-telemetry.js
          grep -q "damageEnemyWithTelemetry" combat-telemetry.js
          grep -q "renderWithStableShake" combat-telemetry.js
          grep -q "drawStablePlayer" combat-telemetry.js
          grep -q "drawStableEnemy" combat-telemetry.js
          grep -q "本局道具" combat-telemetry.js
          grep -q "峰值 DPS" combat-telemetry.js
          grep -q "border-radius: 0" combat-telemetry.css
          grep -q 'id="combat-output-chip"' index.html
          grep -q 'id="telemetry-panel"' index.html
          grep -q 'id="acquired-panel"' index.html
          grep -q 'src="./combat-telemetry.js?v=' index.html

      - name: 检查 HUD 静态结构与低高度可见性
        run: node tests/hud-structure.mjs

      - name: 检查实时非暂停构筑
        run: node tests/live-upgrade.mjs

      - name: 检查夜幕目标、随机星契与增强反馈
        run: node tests/gameplay-director.mjs

      - name: 检查星象契约、星链倍率与星印共鸣
        run: node tests/cosmic-contracts.mjs

      - name: 检查自适应精简 HUD 与悬停详情
        run: node tests/adaptive-hud.mjs

      - name: 检查夜潮超载、首领破韧与战斗驾驶舱
        run: node tests/nightfall-v3.mjs

      - name: 检查长局实体预算与空间碰撞
        run: node tests/long-run-performance.mjs

      - name: 检查全窗口战场与内嵌 HUD
        run: |
          grep -q "height: 100dvh" fullscreen-hud.css
          grep -q -- "--arena-left" fullscreen-hud.css
          grep -q -- "--arena-bottom" fullscreen-hud.css
          grep -q "setArenaInsets" fit-canvas.js
          grep -q "canvasShell.clientHeight" fit-canvas.js
          grep -q "fullscreen-hud.css" index.html
          grep -q "角色状态、目标与当前构筑" index.html
          grep -q "战场道具与输出统计" index.html
          grep -q 'data-hud-version="2"' index.html

      - name: 检查完整战场适配
        run: |
          grep -q "fitWholeBattlefield" fit-canvas.js
          grep -q "ResizeObserver" fit-canvas.js
          grep -q "overflow: hidden" fit-canvas.css
          grep -q "fit-canvas.css" index.html
          grep -q "fit-canvas.js" index.html
