name: 网页游戏检查

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 检查 JavaScript 语法
        run: node --check game.js

      - name: 检查核心静态文件
        run: |
          test -s index.html
          test -s style.css
          test -s game.js
